<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Clicker - Login</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00cec9;
            --text-color: #ecf0f1;
            --border-color: #333;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 400px; padding: 40px;
            border-radius: 20px; border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { margin-bottom: 5px; letter-spacing: 2px; }
        .beta-tag { font-size: 0.9rem; color: #f1c40f; vertical-align: middle; margin-left: 5px; }
        
        .section-divider {
            margin: 30px 0; border: 0; border-top: 1px solid var(--border-color);
            position: relative;
        }
        .section-divider::after {
            content: "OR"; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); background: var(--card-bg);
            padding: 0 10px; color: #666; font-size: 0.8rem;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color);
            background: #121212; color: white; box-sizing: border-box; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-color); }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-primary { background-color: var(--accent-color); color: #000; }
        .btn-primary:hover { background-color: #01efeb; transform: translateY(-2px); }
        .btn-outline { background-color: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); }
        .btn-outline:hover { background-color: rgba(0, 206, 201, 0.1); }

        /* UID発行後のモーダル風表示 */
        #uid-result {
            display: none; background: #000; padding: 15px; border-radius: 8px;
            margin-top: 20px; border: 1px dashed var(--accent-color);
        }
        .uid-value { color: var(--accent-color); font-family: monospace; font-size: 1.1rem; word-break: break-all; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Mining Clicker <span class="beta-tag">(ベータ版)</span></h1>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 30px;">未知の素材を掘り当てよう</p>

        <div id="register-section">
            <div class="input-group">
                <label>新規パスワード</label>
                <input type="password" id="reg-password" placeholder="パスワードを決めてください">
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">UID作成</button>
            
            <div id="uid-result">
                <p style="font-size: 0.8rem; margin: 0;">あなたのUID（ログインに必要です）:</p>
                <div class="uid-value" id="generated-uid"></div>
                <button class="btn btn-outline" style="font-size: 0.8rem; padding: 5px; margin-top: 10px;" onclick="copyAndGo()">UIDをコピーしてゲームへ</button>
            </div>
        </div>

        <hr class="section-divider">

        <div id="login-section">
            <div class="input-group">
                <label>UID</label>
                <input type="text" id="login-uid" placeholder="発行されたUIDを入力">
            </div>
            <div class="input-group">
                <label>パスワード</label>
                <input type="password" id="login-password" placeholder="パスワードを入力">
            </div>
            <button class="btn btn-outline" onclick="handleLogin()">続きから（ログイン）</button>
        </div>
    </div>

    <script>
        // --- 新規登録処理 ---
        async function handleRegister() {
            const password = document.getElementById('reg-password').value;
            if (!password) return alert("パスワードを入力してください");

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('generated-uid').innerText = data.uid;
                    document.getElementById('uid-result').style.display = 'block';
                    // 登録ボタンを無効化して混乱を防ぐ
                    document.querySelector('#register-section .btn-primary').disabled = true;
                } else {
                    alert("エラー: " + data.error);
                }
            } catch (e) {
                alert("サーバー接続エラー");
            }
        }

        // --- ログイン処理 ---
        async function handleLogin() {
            const uid = document.getElementById('login-uid').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: uid, password: password })
                });
                const data = await response.json();

                if (response.ok) {
                    window.location.href = "/game"; 
                } else {
                    alert("ログイン失敗: " + data.error);
                }
            } catch (e) {
                alert("サーバー接続エラー");
            }
        }

        // --- 利便性ツール ---
        function copyAndGo() {
            const uid = document.getElementById('generated-uid').innerText;
            navigator.clipboard.writeText(uid).then(() => {
                alert("UIDをクリップボードにコピーしました。大切に保管してください！");
                // 登録直後はそのままログイン画面のUID欄に埋めてあげると親切
                document.getElementById('login-uid').value = uid;
                document.getElementById('login-password').value = document.getElementById('reg-password').value;
            });
        }
    </script>
</body>
</html>
